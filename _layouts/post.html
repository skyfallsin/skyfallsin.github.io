---
layout: default
---
<div class="post-layout">
  <nav class="toc" id="toc"><button class="toc-toggle" onclick="this.parentElement.classList.toggle('toc-open')">Contents</button></nav>
  <article>
    <h1><a href="/" class="back-arrow" aria-label="Back to home">←</a> {{ page.title }}</h1>
    <p class="post-date">{{ page.date | date: "%Y-%m-%d" }}</p>
    {{ content }}
  </article>
</div>
<script>
(function() {
  // Wrap TL;DR paragraph + following ul in a .tldr callout
  const tldrP = document.querySelector('article p > strong');
  if (tldrP && /^TL;?DR/i.test(tldrP.textContent)) {
    const p = tldrP.parentElement;
    const ul = p.nextElementSibling;
    if (ul && ul.tagName === 'UL') {
      const wrapper = document.createElement('div');
      wrapper.className = 'tldr';
      p.parentNode.insertBefore(wrapper, p);
      wrapper.appendChild(p);
      wrapper.appendChild(ul);
    }
  }
})();
(function() {
  const headings = document.querySelectorAll('article h1:not(:first-of-type), article h2, article h3');
  const toc = document.getElementById('toc');
  if (headings.length < 2) return;
  
  const ul = document.createElement('ul');
  let currentH2Details = null;
  let currentH2Ul = null;
  
  headings.forEach((h, i) => {
    if (!h.id) h.id = 'section-' + i;
    
    if (h.tagName === 'H1' || h.tagName === 'H2') {
      const details = document.createElement('details');
      details.className = h.tagName.toLowerCase() + '-section no-children';
      const summary = document.createElement('summary');
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      summary.appendChild(a);
      details.appendChild(summary);
      currentH2Ul = document.createElement('ul');
      details.appendChild(currentH2Ul);
      ul.appendChild(details);
      currentH2Details = details;
    } else if (h.tagName === 'H3') {
      const li = document.createElement('li');
      li.className = 'h3';
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      li.appendChild(a);
      if (currentH2Ul) {
        currentH2Details.classList.remove('no-children');
        currentH2Ul.appendChild(li);
      } else {
        ul.appendChild(li);
      }
    }
  });
  toc.appendChild(ul);
})();
</script>
